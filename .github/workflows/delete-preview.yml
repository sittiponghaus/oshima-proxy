name: Delete Workers Preview

on:
  delete:

# `delete` workflows only run from the default branch. Merge this before improvements take effect.

jobs:
  preview-delete:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Delete Workers Preview for deleted branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run preview:delete -- "${{ github.event.ref }}"
